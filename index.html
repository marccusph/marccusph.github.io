  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

amily:inherit;cursor:pointer;border:none;background:none;color:inherit}\ninput{font-family:inherit}\n::selection{background:rgba(233,106,48,.18)}\n\n/* ============ App window ============ */\n.app-window{\n  position:relative;\n  width:min(1480px,96vw);\n  height:min(908px,93vh);\n  margin:3.2vh auto;\n  padding:20px;\n  border-radius:36px;\n  background:rgba(255,255,255,.4);\n  border:1px solid rgba(255,255,255,.5);\n  backdrop-filter:blur(34px) saturate(135%);\n  -webkit-backdrop-filter:blur(34px) saturate(135%);\n  box-shadow:0 46px 110px -34px rgba(55,50,47,.24), inset 0 1px 0 rgba(255,255,255,.6);\n  display:grid;\n  grid-template-columns:254px 1fr;\n  grid-template-rows:auto 1fr;\n  gap:20px;\n  overflow:hidden;\n}\n\n/* ============ Sidebar ============ */\n.sidebar{\n  grid-row:1 / span 2;\n  background:var(--glass);\n  border:1px solid var(--glass-line);\n  border-radius:var(--radius);\n  box-shadow:var(--shadow-card);\n  padding:24px 16px 18px;\n  display:flex;flex-direction:column;\n}\n.brand{display:flex;align-items:center;gap:12px;padding:4px 8px 22px}\n.sphere{\n  width:46px;height:46px;border-radius:50%;flex:none;\n  background:\n    radial-gradient(circle at 34% 28%, #ffffff 0%, #ffd9c2 14%, #ff9a63 38%, #f2601f 70%, #c33f15 100%);\n  box-shadow:inset 0 -4px 8px rgba(150,40,0,.4), inset 0 3px 6px rgba(255,255,255,.6), 0 6px 16px -4px rgba(233,106,48,.3);\n  position:relative;\n}\n.sphere::after{content:\"\";position:absolute;top:6px;left:9px;width:13px;height:9px;border-radius:50%;background:rgba(255,255,255,.75);filter:blur(1px)}\n.sphere.sm{width:30px;height:30px}\n.sphere.lg{width:74px;height:74px}\n.brand .wm{font-weight:800;font-size:20px;letter-spacing:-.5px;line-height:1.05}\n.brand .wm small{display:block;font-size:10.5px;font-weight:500;letter-spacing:.4px;color:var(--ink-soft);margin-top:3px}\n\n.nav-group{margin-top:6px}\n.nav-bottom{margin-top:auto}\n.nav-bottom .nav-item{justify-content:center}\n.nav-bottom .nav-item>span[style]{display:none}\n.nav-label{font-size:10.5px;font-weight:600;letter-spacing:1.4px;color:var(--ink-faint);padding:0 14px;margin:16px 0 8px}\n.nav-item{\n  width:100%;display:flex;align-items:center;gap:13px;\n  padding:12px 14px;border-radius:16px;\n  font-size:14.5px;font-weight:500;color:var(--ink-soft);\n  transition:.18s;text-align:left;\n}\n.nav-item svg{width:19px;height:19px;flex:none;stroke-width:1.7}\n.nav-item:hover{color:var(--ink);background:rgba(255,255,255,.4)}\n.nav-item.active{\n  background:rgba(255,255,255,.92);color:var(--ink);font-weight:600;\n  box-shadow:0 10px 24px -12px rgba(55,50,47,.2);\n}\n.nav-item.active svg{color:var(--accent)}\n.nav-count{margin-left:auto;font-size:11px;font-weight:600;color:var(--ink-faint);\n  background:rgba(0,0,0,.05);padding:1px 8px;border-radius:20px}\n.nav-item.active .nav-count{background:rgba(233,106,48,.14);color:var(--accent-deep)}\n\n.side-foot{margin-top:auto;padding:14px 12px 4px}\n.side-foot .url{font-size:12px;color:var(--ink-faint);font-weight:500}\n.side-foot .url b{color:var(--accent-deep);font-weight:600}\n.side-social{margin-top:14px;display:flex;justify-content:center;gap:10px;padding:14px 8px 4px;position:relative}\n.side-social a,.side-social .mail-btn{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;\n  background:rgba(255,255,255,.55);border:1px solid var(--glass-line);color:var(--ink-soft);transition:.18s}\n.side-social a:hover,.side-social .mail-btn:hover{background:#fff;color:var(--accent);transform:translateY(-2px)}\n.side-social svg{width:18px;height:18px;stroke-width:1.8}\n.mail-pop{position:absolute;left:8px;bottom:calc(100% + 8px);display:none;\n  background:rgba(255,255,255,.94);backdrop-filter:blur(18px);border:1px solid var(--glass-line);\n  border-radius:14px;padding:11px 15px;white-space:nowrap;z-index:25;\n  box-shadow:0 20px 44px -16px rgba(55,50,47,.28)}\n.mail-pop.open{display:block;animation:popin .18s ease}\n@keyframes popin{from{transform:translateY(6px)}to{transform:none}}\n#mailAddr{font-size:13px;font-weight:600;color:var(--ink);cursor:pointer;user-select:all}\n#mailAddr:hover{color:var(--accent)}\n\n/* ============ Topbar ============ */\n.topbar{\n  grid-column:2;grid-row:1;\n  display:flex;align-items:center;gap:20px;\n  padding:2px 4px;\n}\n.page-head{flex:1;min-width:0}\n.page-title{font-size:40px;font-weight:800;letter-spacing:-1.2px;line-height:1}\n.page-sub{font-size:13px;font-weight:500;color:var(--ink-soft);margin-top:6px}\n.top-tools{display:flex;align-items:center;gap:12px}\n.search{\n  display:flex;align-items:center;gap:10px;\n  background:var(--glass-strong);border:1px solid var(--glass-line);\n  border-radius:30px;padding:11px 18px;width:230px;\n  box-shadow:var(--shadow-card);\n}\n.search svg{width:17px;height:17px;color:var(--ink-faint);flex:none}\n.search input{border:none;background:none;outline:none;font-size:13.5px;width:100%;color:var(--ink)}\n.search input::placeholder{color:var(--ink-faint)}\n\n.lang{position:relative}\n.lang-btn{\n  display:flex;align-items:center;gap:7px;\n  background:var(--glass-strong);border:1px solid var(--glass-line);\n  border-radius:30px;padding:11px 14px;font-size:12.5px;font-weight:600;\n  box-shadow:var(--shadow-card);\n}\n.lang-btn svg{width:14px;height:14px;color:var(--ink-soft)}\n.lang-menu{\n  position:absolute;right:0;top:calc(100% + 8px);z-index:30;\n  background:rgba(255,255,255,.82);backdrop-filter:blur(20px);\n  border:1px solid var(--glass-line);border-radius:18px;padding:7px;\n  box-shadow:0 26px 50px -20px rgba(55,50,47,.25);\n  display:none;flex-direction:column;min-width:120px;\n}\n.lang-menu.open{display:flex}\n.lang-opt{padding:9px 13px;border-radius:11px;font-size:13px;font-weight:500;text-align:left;color:var(--ink-soft)}\n.lang-opt:hover{background:rgba(233,106,48,.1);color:var(--ink)}\n.lang-opt.sel{color:var(--accent-deep);font-weight:700;background:rgba(233,106,48,.1)}\n.avatar{\n  width:44px;height:44px;border-radius:50%;flex:none;\n  background:var(--glass-strong);border:1px solid var(--glass-line);\n  display:grid;place-items:center;box-shadow:var(--shadow-card);overflow:hidden;\n}\n.avatar svg{width:20px;height:20px;color:var(--ink-soft)}\n\n/* ============ Main scroll area ============ */\n.main{grid-column:2;grid-row:2;overflow-y:auto;padding-right:4px}\n.main::-webkit-scrollbar{width:8px}\n.main::-webkit-scrollbar-thumb{background:rgba(105,105,105,.18);border-radius:8px}\n.main::-webkit-scrollbar-track{background:transparent}\n\n.view{display:none}\n.view.active{display:block}\n@media (prefers-reduced-motion:no-preference){\n  .view.active{animation:fade .35s ease both}\n}\n@keyframes fade{from{transform:translateY(10px)}to{transform:none}}\n\n/* ---- gradient art covers ---- */\n.art{position:relative;overflow:hidden}\n.art .wmk{\n  position:absolute;inset:0;display:grid;place-items:center;\n  font-size:54px;font-weight:800;color:rgba(255,255,255,.6);\n  letter-spacing:-1px;text-shadow:0 2px 14px rgba(95,92,89,.18);\n}\n.art1{background:radial-gradient(110% 110% at 18% 12%,#ded0ee 0%,transparent 55%),radial-gradient(120% 120% at 85% 75%,#f5d9e4 0%,transparent 55%),linear-gradient(120deg,#f3eef4,#ebe4ef)}\n.art2{background:radial-gradient(110% 110% at 20% 22%,#dfeacf 0%,transparent 52%),radial-gradient(120% 120% at 86% 78%,#f3e3c8 0%,transparent 55%),linear-gradient(120deg,#f0f2e8,#f0ebdc)}\n.art3{background:radial-gradient(110% 110% at 24% 18%,#ccd8f1 0%,transparent 52%),radial-gradient(120% 120% at 82% 84%,#e2d5f2 0%,transparent 55%),linear-gradient(120deg,#eaeef7,#ebe5f3)}\n.art4{background:radial-gradient(110% 110% at 18% 26%,#f4d3b3 0%,transparent 50%),radial-gradient(120% 120% at 84% 24%,#cfe5ca 0%,transparent 52%),linear-gradient(120deg,#f4ece0,#e8eee1)}\n.art5{background:radial-gradient(110% 110% at 22% 80%,#f2c0a6 0%,transparent 55%),radial-gradient(120% 120% at 80% 16%,#f2ddae 0%,transparent 52%),linear-gradient(120deg,#f5e8dc,#f1e0d0)}\n.art6{background:radial-gradient(110% 110% at 16% 18%,#f2d4b6 0%,transparent 52%),radial-gradient(120% 130% at 88% 86%,#e9bd9d 0%,transparent 58%),linear-gradient(120deg,#f1eae2,#eddfd2)}\n.art7{background:radial-gradient(110% 110% at 20% 24%,#f2cbd8 0%,transparent 52%),radial-gradient(120% 120% at 86% 80%,#f0ceb2 0%,transparent 55%),linear-gradient(120deg,#f5ebee,#f0e2d8)}\n.art8{background:radial-gradient(110% 110% at 22% 20%,#cde6dd 0%,transparent 52%),radial-gradient(120% 120% at 84% 82%,#f0d6b8 0%,transparent 55%),linear-gradient(120deg,#e8f0ea,#efe5d7)}\n\n/* ============ Home ============ */\n.home-grid{display:grid;grid-template-columns:1.55fr 1fr;gap:18px}\n.hero{\n  position:relative;border-radius:var(--radius);overflow:hidden;\n  min-height:236px;display:flex;flex-direction:column;justify-content:flex-end;\n  padding:26px;color:#3c3936;border:1px solid rgba(255,255,255,.6);\n  box-shadow:var(--shadow-card);cursor:pointer;\n}\n.hero .kick{font-size:14.5px;font-weight:600;letter-spacing:0;opacity:.82;margin-bottom:16px;max-width:34ch;line-height:1.5;position:relative;text-wrap:pretty}\n.hero h2{font-size:30px;font-weight:800;line-height:1.08;max-width:13ch;letter-spacing:-.6px;position:relative;text-wrap:balance}\n.hero p{font-size:13.5px;font-weight:500;margin-top:12px;max-width:36ch;color:#6b6663;position:relative}\n.hero .go{\n  position:absolute;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;\n  background:#fff;display:grid;place-items:center;box-shadow:0 12px 24px -10px rgba(233,106,48,.3);\n  transition:.2s;\n}\n.hero .go svg{width:20px;height:20px;color:var(--accent);stroke-width:2.2}\n.hero:hover .go{transform:scale(1.08) rotate(8deg)}\n.home-hero{min-height:240px;justify-content:flex-start}\n.tip-trigger{font-family:inherit;display:inline-flex;align-items:center;gap:9px;margin-top:18px;\n  font-size:15px;font-weight:600;color:#56524e;cursor:pointer;text-align:left;width:max-content;max-width:100%;\n  background:rgba(255,255,255,.6);border:1px solid rgba(255,255,255,.72);\n  padding:12px 18px;border-radius:15px;transition:.18s}\n.tip-trigger:hover{background:#fff;color:var(--accent-deep);transform:translateY(-2px);box-shadow:0 14px 28px -14px rgba(55,50,47,.18)}\n.tip-trigger.active{background:#fff;color:var(--accent-deep)}\n.hero-reveal{max-height:0;overflow:hidden;opacity:0;\n  transition:max-height .45s cubic-bezier(.2,.8,.2,1),opacity .35s ease,margin-top .45s ease}\n.hero-reveal.open{max-height:200px;opacity:1;margin-top:20px}\n.hero-reveal .tip-label{font-size:11px;font-weight:700;letter-spacing:1.1px;text-transform:uppercase;color:#b35a22;margin-bottom:9px}\n.hero-reveal p{font-size:14px;line-height:1.65;color:#56524e;font-weight:500;max-width:42ch;text-wrap:pretty}\n\n.tiles{display:grid;grid-template-columns:1fr 1fr;gap:14px}\n.ctile{\n  position:relative;border-radius:var(--radius-sm);overflow:hidden;\n  min-height:86px;padding:13px;display:flex;align-items:flex-end;\n  border:1px solid rgba(255,255,255,.5);box-shadow:var(--shadow-card);\n  cursor:pointer;transition:.2s;color:#34312e;\n}\n.ctile:hover{transform:translateY(-3px)}\n.ctile .label{font-size:16px;font-weight:700;letter-spacing:-.3px;z-index:1}\n.ctile .cnt{position:absolute;top:13px;right:14px;font-size:11px;font-weight:600;\n  background:rgba(255,255,255,.7);padding:2px 9px;border-radius:20px;color:#6b6661}\n\n.section-row{display:flex;align-items:center;justify-content:space-between;margin:26px 2px 14px}\n.section-row h3{font-size:20px;font-weight:800;letter-spacing:-.4px}\n.chips{display:flex;gap:8px}\n.chip{\n  padding:9px 16px;border-radius:22px;font-size:12.5px;font-weight:600;color:var(--ink-soft);\n  background:var(--glass);border:1px solid var(--glass-line);transition:.16s;\n}\n.chip:hover{color:var(--ink)}\n.chip.active{background:#fff;color:var(--ink);box-shadow:0 8px 18px -10px rgba(55,50,47,.2)}\n\n/* ============ Project grid + cards (bento) ============ */\n.grid{display:grid;grid-template-columns:repeat(5,1fr);grid-auto-rows:10px;gap:15px;\n  grid-auto-flow:dense;padding-bottom:34px}\n.pcard{\n  position:relative;border-radius:22px;overflow:hidden;cursor:pointer;\n  border:1px solid var(--glass-line);box-shadow:var(--shadow-card);\n  transition:transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .22s;\n  grid-column:span 1;grid-row:span 8;\n}\n.pcard:hover{transform:translateY(-5px);box-shadow:0 30px 52px -22px rgba(55,50,47,.28)}\n.pcard .cover{position:absolute;inset:0;transition:transform .5s cubic-bezier(.2,.8,.2,1)}\n.pcard:hover .cover{transform:scale(1.06)}\n.pcard .scrim{position:absolute;left:0;right:0;bottom:0;height:62%;z-index:1;\n  background:linear-gradient(to top,rgba(255,255,255,.6),rgba(255,255,255,.12) 55%,transparent)}\n.pcard .pname{position:absolute;left:14px;right:14px;bottom:16px;z-index:2;text-align:center;\n  font-size:16px;font-weight:700;letter-spacing:-.3px;line-height:1.15;color:#3a3734;\n  text-wrap:balance}\n\n/* bento size variants */\n.pcard.bn-a{grid-column:span 2;grid-row:span 11}      /* big */\n.pcard.bn-b{grid-column:span 2;grid-row:span 7}       /* wide */\n.pcard.bn-c{grid-column:span 1;grid-row:span 11}      /* tall */\n.pcard.bn-d{grid-column:span 1;grid-row:span 8}       /* std */\n.pcard.bn-e{grid-column:span 1;grid-row:span 6}       /* small */\n.pcard.bn-a .pname{font-size:21px}\n.pcard.bn-b .pname{font-size:18px}\n.pcard.bn-c .pname{font-size:16px}\n\n/* equal-size cards (categories with ≤4 projects) — uniform fixed size, packed from the left */\n.grid.even{grid-template-columns:repeat(auto-fill,248px);grid-auto-rows:auto;grid-auto-flow:row;justify-content:start}\n.grid.even .pcard{grid-column:auto;grid-row:auto;aspect-ratio:4/5}\n@media (max-width:760px){\n  .grid.even{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}\n}\n\n/* centered icon + name + theme */\n.pc-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;z-index:2;padding:0 12px 18px}\n.pc-center svg{width:27px;height:27px;color:#3a3734;stroke-width:1.6;flex:none}\n.pc-center .pc-icons svg{width:21px;height:21px}\n.pcard.bn-a .pc-center .pc-icons svg,.pcard.bn-b .pc-center .pc-icons svg{width:24px;height:24px}\n.pc-name{font-size:17px;font-weight:800;letter-spacing:-.3px;color:#3a3734;text-align:center;line-height:1.12;text-wrap:balance}\n.pc-theme{position:absolute;left:12px;right:12px;bottom:12px;z-index:2;text-align:center;\n  font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#5d5853}\n.pcard.bn-a .pc-name{font-size:22px}\n.pcard.bn-a .pc-center svg{width:34px;height:34px}\n.pcard.bn-b .pc-name{font-size:19px}\n.pcard.bn-b .pc-center svg{width:30px;height:30px}\n\n.empty{padding:60px 20px;text-align:center;color:var(--ink-faint);font-weight:500;font-size:14px}\n\n@media (max-width:1180px){\n  .grid{grid-template-columns:repeat(4,1fr)}\n  .pcard.bn-a,.pcard.bn-b{grid-column:span 2}\n}\n@media (max-width:760px){\n  .grid{grid-template-columns:repeat(2,1fr)}\n  .pcard.bn-a{grid-column:span 2}\n  .pcard.bn-b{grid-column:span 2}\n  .pcard.bn-c{grid-row:span 9}\n}\n\n/* ============ Aside (About) ============ */\n.aside{grid-column:3;grid-row:2;overflow-y:auto}\n.about{\n  background:var(--glass);border:1px solid var(--glass-line);border-radius:var(--radius);\n  box-shadow:var(--shadow-card);padding:26px 24px;height:100%;display:flex;flex-direction:column;\n}\n.about-top{position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;\n  padding:18px 8px 22px;border-radius:var(--radius-sm);overflow:hidden;margin-bottom:22px}\n.about-top::before{content:\"\";position:absolute;inset:0;\n  background-image:radial-gradient(rgba(120,115,110,.16) 1px,transparent 1.4px);background-size:11px 11px;\n  -webkit-mask:radial-gradient(circle at 50% 38%,#000 0%,transparent 68%);\n          mask:radial-gradient(circle at 50% 38%,#000 0%,transparent 68%);}\n.about-top .sphere{margin-bottom:16px;position:relative}\n.about-top h3{font-size:21px;font-weight:800;letter-spacing:-.4px;line-height:1.1;position:relative}\n.about-top .role{font-size:12.5px;font-weight:600;color:var(--accent-deep);margin-top:6px;position:relative}\n.about .bio{font-size:13.5px;line-height:1.62;color:var(--ink-soft);font-weight:500;text-wrap:pretty}\n.about .meta{margin-top:20px;display:flex;flex-direction:column;gap:13px}\n.about .meta .row{display:flex;align-items:center;gap:12px;font-size:13px;font-weight:500;color:var(--ink)}\n.about .meta .row svg{width:17px;height:17px;color:var(--accent);flex:none;stroke-width:1.8}\n.about .cta{\n  margin-top:auto;display:flex;align-items:center;justify-content:center;gap:9px;\n  background:var(--ink);color:#fff;font-weight:600;font-size:14px;\n  padding:15px;border-radius:18px;transition:.2s;\n}\n.about .cta:hover{background:var(--accent);box-shadow:0 16px 30px -12px rgba(233,106,48,.4)}\n.about .cta svg{width:17px;height:17px;stroke-width:2}\n.about .socials{display:flex;gap:9px;margin-top:12px}\n.about .socials a{flex:1;display:grid;place-items:center;padding:11px;border-radius:14px;\n  background:rgba(255,255,255,.55);border:1px solid var(--glass-line);transition:.18s}\n.about .socials a:hover{background:#fff;color:var(--accent)}\n.about .socials svg{width:18px;height:18px;stroke-width:1.8}\n\n/* ============ Detail overlay ============ */\n.overlay{\n  position:absolute;inset:0;z-index:50;border-radius:36px;overflow:hidden;\n  background:rgba(238,237,239,.92);backdrop-filter:blur(26px) saturate(108%);\n  display:none;opacity:0;transition:opacity .3s;\n}\n.overlay.open{display:block;opacity:1}\n.sheet{\n  position:absolute;top:20px;right:20px;bottom:20px;width:min(680px,calc(100% - 40px));\n  background:rgba(255,255,255,.7);backdrop-filter:blur(30px);\n  border:1px solid var(--glass-line);border-radius:28px;\n  box-shadow:0 50px 100px -30px rgba(55,50,47,.28);\n  transform:translateX(40px);transition:transform .34s cubic-bezier(.2,.8,.2,1);\n  display:flex;flex-direction:column;overflow:hidden;\n}\n.ove n:left;padding:34px 32px}\n.xhead-txt{display:flex;flex-direction:column;align-items:flex-start}\n.xhead .ss-date{color:#6b6661;margin-bottom:8px}\n.xtitle{font-size:42px;font-weight:800;letter-spacing:-1.4px;line-height:1.02;margin:0;color:#34312e;text-wrap:balance}\n.xtag{font-size:15.5px;font-weight:600;color:#56524e;margin:10px 0 0;letter-spacing:-.2px;max-width:46ch;text-wrap:balance}\n.xclose{position:absolute;top:16px;right:16px;width:42px;height:42px;border-radius:50%;\n  background:rgba(255,255,255,.9);display:grid;place-items:center;color:var(--ink);\n  box-shadow:0 10px 22px -10px rgba(55,50,47,.4);transition:.25s;z-index:2}\n.xclose svg{width:17px;height:17px}\n.xclose:hover{background:var(--ink);color:#fff;transform:rotate(90deg)}\n.xbody{padding:26px 34px 34px}\n.xbody .ss-body{margin-top:0;padding-top:0;border-top:none;columns:2 360px;column-gap:44px}\n.xbody .ss-body p{max-width:none;break-inside:avoid}\n.x-gallery{display:flex;flex-direction:column;gap:14px;margin-top:6px}\n/* text-left / photo-right split layout */\n.story-split{display:grid;grid-template-columns:1fr minmax(140px,180px);gap:38px;align-items:stretch}\n.story-split-text .ss-body{columns:auto;column-gap:0}\n.story-split-text .ss-body p{max-width:62ch}\n.story-split-photo{margin:0;height:100%}\n.story-split-photo img{width:100%;height:100%;object-fit:cover;border-radius:18px;display:block;\n  box-shadow:0 26px 60px -28px rgba(55,50,47,.5);background:#efe7df}\n@media (max-width:760px){\n  .story-split{grid-template-columns:1fr;gap:24px;align-items:start}\n  .story-split-photo{max-width:320px;height:auto}\n  .story-split-photo img{height:auto}\n}\n.x-gallery .pdf-page{box-shadow:0 14px 30px -20px rgba(55,50,47,.4)}\n.xbody .story-links{margin-top:24px}\n@media (max-width:900px){\n  .xbody{padding:22px 18px 26px}\n}\n/* ---- seesaw-style case study layout ---- */\n.sheet.ss .sheet-head{height:170px}\n.sheet.ss .sheet-head h2,.sheet.ss .sheet-head .scat{display:none}\n.ss-date{font-size:11 ent,rgba(233,106,48,.35) 6%,rgba(233,106,48,.35) 94%,transparent)}\n.tl-item{position:relative;width:50%;padding-bottom:34px}\n.tl-item.tl-left{left:0;padding-right:34px}\n.tl-item.tl-right{left:50%;padding-left:34px}\n.tl-dot{position:absolute;top:4px;width:13px;height:13px;border-radius:50%;z-index:1;\n  background:var(--accent);border:3px solid rgba(255,255,255,.95);\n  box-shadow:0 0 0 3px rgba(233,106,48,.18)}\n.tl-item.tl-left .tl-dot{right:-7.5px}\n.tl-item.tl-right .tl-dot{left:-7.5px}\n.tl-item.tl-left .tl-card{text-align:right}\n.tl-year{display:inline-block;font-size:11.5px;font-weight:700;letter-spacing:.8px;color:var(--accent-deep);\n  background:rgba(233,106,48,.1);padding:4px 12px;border-radius:20px;margin-bottom:9px}\n.tl-text{font-size:13.5px;line-height:1.62;color:var(--ink-soft);font-weight:500;text-wrap:pretty;margin:0}\n/* polaroid / photo-album shot */\n.polaroid{display:inline-block;margin:14px 0 0;padding:8px 8px 7px;background:#fdfcfa;\n  border:1px solid rgba(0,0,0,.05);border-radius:4px;max-width:300px;\n  box-shadow:0 12px 26px -14px rgba(55,50,47,.45);transform:rotate(-2.2deg);transition:.25s}\n.tl-item.tl-right .polaroid{transform:rotate(2.2deg)}\n.polaroid:hover{transform:rotate(0) scale(1.04)}\n.polaroid img{display:block;width:100%;height:auto;border-radius:2px;\n  filter:grayscale(.3) sepia(.14) saturate(.9) contrast(1.03) brightness(1.02)}\n.polaroid figcaption{font-family:'Caveat',cursive;font-size:15.5px;font-weight:600;color:#6b6661;\n  padding:6px 2px 0;text-align:center;line-height:1.1}\n@media (max-width:620px){\n  .timeline::before{left:8px}\n  .tl-item,.tl-item.tl-right{width:100%;left:0;padding-left:30px;padding-right:0}\n  .tl-item.tl-left{padding-left:30px;padding-right:0}\n  .tl-item.tl-left .tl-card{text-align:left}\n  .tl-item.tl-left .tl-dot{left:1.5px;right:auto}\n  .tl-item.tl-right .tl-dot{left:1.5px}\n}\n/* ---- photo collage ---- */\n.photo-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin:24p
